name: Deploy Cost Lambda

on:
  push:
    branches:
      - master
    paths:
      - 'cost_lambda/**'
  workflow_dispatch:  # manual trigger for first deploy or emergency redeploys

env:
  AWS_REGION:            eu-west-1
  LAMBDA_FUNCTION_NAME:  cloudrag-cost-tracker-dev

jobs:
  deploy:
    name: Package and deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Package Lambda
        run: zip -j cost_lambda.zip cost_lambda/handler.py

      - name: Deploy Lambda code
        run: |
          aws lambda update-function-code \
            --function-name ${{ env.LAMBDA_FUNCTION_NAME }} \
            --zip-file fileb://cost_lambda.zip \
            --region ${{ env.AWS_REGION }}

      - name: Wait for update to complete
        run: |
          aws lambda wait function-updated \
            --function-name ${{ env.LAMBDA_FUNCTION_NAME }} \
            --region ${{ env.AWS_REGION }}
          echo "Lambda deploy complete"
